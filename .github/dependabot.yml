# Dependabot — alertas automáticas de vulnerabilidades y actualizaciones
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm dependencies del proyecto Astro
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    # IMPORTANTE: solo patch y minor automaticamente.
    # Los major se revisan a mano (suelen tener breaking changes).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Agrupar updates relacionadas en un solo PR
    groups:
      astro-ecosystem:
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - "minor"
          - "patch"
      dev-tools:
        patterns:
          - "@types/*"
          - "typescript"
          - "vitest*"
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
