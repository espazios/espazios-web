<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" fill="none">
  <title>Espazios</title>
  <!-- Monograma: casa estilizada con N diagonal -->
  <g fill="#80BF9B">
    <!-- Columna izquierda -->
    <rect x="0" y="60" width="32" height="140"/>
    <!-- Columna derecha -->
    <rect x="138" y="60" width="32" height="140"/>
    <!-- Diagonal superior (N) -->
    <polygon points="0,0 32,0 170,135 170,60 138,60 32,60 32,135"/>
    <!-- Columna central pequeña -->
    <rect x="60" y="120" width="32" height="80"/>
  </g>
  <!-- Wordmark "Espazios" -->
  <text x="210" y="150"
        font-family="'Fraunces', Georgia, serif"
        font-weight="500"
        font-size="108"
        fill="#163840"
        letter-spacing="-1">Espazios</text>
</svg>
