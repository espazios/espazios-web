# Dependabot — alertas automáticas de vulnerabilidades y actualizaciones
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm dependencies del proyecto Astro
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    # Agrupar actualizaciones menores y de patch en un solo PR
    groups:
      astro-ecosystem:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-tools:
        patterns:
          - "@types/*"
          - "typescript"
          - "vitest*"
          - "@playwright/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
