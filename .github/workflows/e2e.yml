# E2E del Cotizador (Playwright) — corre solo cuando cambian las rutas
# relevantes, para no agregar tiempo a PRs de contenido/CMS.
name: E2E · Cotizador (Playwright)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/components/Cotizador.astro'
      - 'src/pages/api/lead.ts'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'src/components/Cotizador.astro'
      - 'src/pages/api/lead.ts'
      - 'e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: mock_token_for_ci
          HUBSPOT_PORTAL_ID: '0'
          PUBLIC_SITE_URL: http://localhost:4321

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
